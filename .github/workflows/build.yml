name: Build Synapse

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            python: '3.13'
            nuitka_extra: >-
              --macos-create-app-bundle
              --macos-app-name=Synapse
              --macos-app-icon=synapse/icons/synapse_icon.png
            artifact_name: Synapse-macOS-arm64
          - os: windows-latest
            python: '3.13'
            nuitka_extra: >-
              --windows-console-mode=disable
              --windows-icon-from-ico=synapse/icons/synapse_icon.ico
            artifact_name: Synapse-Windows-x64
          - os: ubuntu-latest
            python: '3.13'
            nuitka_extra: ''
            artifact_name: Synapse-Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build oir_reader_rs
        run: cd oir_reader_rs && maturin build --release && pip install target/wheels/*.whl

      - name: Build image_process_rs
        run: cd image_process_rs && maturin build --release && pip install target/wheels/*.whl

      - name: Install Python dependencies
        run: pip install . nuitka ordered-set zstandard

      - name: Verify NodeGraphQt installation
        run: |
          python -c "import NodeGraphQt; print('NodeGraphQt OK:', NodeGraphQt.__file__)"
          pip show NodeGraphQt || echo "NodeGraphQt not in pip list"
          python -c "import importlib.util; spec = importlib.util.find_spec('NodeGraphQt'); print('spec:', spec)"

      - name: Build with Nuitka
        run: >-
          python -m nuitka
          --standalone
          --output-dir=dist
          --output-filename=Synapse
          --enable-plugin=pyside6
          --assume-yes-for-downloads
          --include-package=synapse
          --include-package=NodeGraphQt
          --include-module=oir_reader_rs
          --include-module=image_process_rs
          --include-module=matplotlib.backends.backend_svg
          --include-module=PySide6.QtOpenGL
          --include-module=PySide6.QtOpenGLWidgets
          --include-module=synapse.plugin_imports
          --include-data-files=llm_node_schema.json=llm_node_schema.json
          --include-data-dir=./workflows=workflows
          --include-raw-dir=./synapse/site=synapse/site
          --nofollow-import-to=tkinter
          --nofollow-import-to=test
          --nofollow-import-to=torch
          --nofollow-import-to=transformers
          --nofollow-import-to=huggingface_hub
          --nofollow-import-to=sympy
          --nofollow-import-to=dask
          --jobs=4
          ${{ matrix.nuitka_extra }}
          main.py

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../${{ matrix.artifact_name }}.zip Synapse.app

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/Synapse.dist -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf ../${{ matrix.artifact_name }}.tar.gz Synapse.dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Synapse-*.zip
            Synapse-*.tar.gz
