name: Build Rust Wheels

on:
  push:
    tags: ['rust-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.1)'
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
        python: ['3.12', '3.13', '3.14']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build oir_reader_rs wheel
        working-directory: oir_reader_rs
        run: maturin build --release

      - name: Build image_process_rs wheel
        working-directory: image_process_rs
        run: maturin build --release

      - name: Collect wheels
        shell: bash
        run: |
          mkdir -p dist
          find oir_reader_rs/target/wheels -name '*.whl' -exec cp {} dist/ \;
          find image_process_rs/target/wheels -name '*.whl' -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.whl
