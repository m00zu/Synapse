name: Build Nuitka Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.1.1). Leave empty to skip upload.'
        type: string
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install .
          pip install nuitka ordered-set zstandard
          pip install oir_reader_rs image_process_rs --find-links https://github.com/m00zu/Synapse/releases/expanded_assets/rust-v0.1.1

      - name: Build Windows exe
        env:
          PYTHONPATH: ./util
        run: |
          python -m nuitka --onefile --windows-console-mode=attach --windows-icon-from-ico="./synapse/icons/synapse_icon.ico" --windows-product-name="Synapse" --product-name="Synapse" --onefile-tempdir-spec="{CACHE_DIR}/{PRODUCT}/{VERSION}" --enable-plugin=pyside6 --assume-yes-for-downloads --output-filename="Synapse.exe" --output-dir=dist --jobs=4 --include-package=synapse --include-package=NodeGraphQt --include-module=oir_reader_rs --include-module=image_process_rs --include-module=matplotlib.backends.backend_svg --include-module=PySide6.QtOpenGL --include-module=PySide6.QtOpenGLWidgets --include-module=synapse.plugin_imports --include-data-files="synapse/llm_node_schema.json=llm_node_schema.json" --include-data-dir="./workflows=workflows" --include-raw-dir="./synapse/site=site" --nofollow-import-to=tkinter --nofollow-import-to=test --nofollow-import-to=torch --nofollow-import-to=transformers --nofollow-import-to=huggingface_hub --nofollow-import-to=sympy --nofollow-import-to=dask --product-version="0.1.1" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-Windows
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload to release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*.exe
