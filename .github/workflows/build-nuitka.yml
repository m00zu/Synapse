name: Build Nuitka Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.1.1). Leave empty to skip upload.'
        type: string
        required: false
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_macos_arm:
        description: 'Build macOS ARM (M-series)'
        type: boolean
        default: true
      build_macos_intel:
        description: 'Build macOS Intel'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    if: inputs.build_windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install .
          pip install nuitka ordered-set zstandard
          pip install oir_reader_rs image_process_rs --find-links https://github.com/m00zu/Synapse/releases/expanded_assets/rust-v0.1.1

      - name: Build Windows exe
        env:
          PYTHONPATH: ./util
        run: |
          python -m nuitka --show-progress --show-scons --onefile --windows-console-mode=attach --windows-icon-from-ico="./synapse/icons/synapse_icon.ico" --windows-product-name="Synapse" --product-name="Synapse" --onefile-tempdir-spec="{CACHE_DIR}/{PRODUCT}/{VERSION}" --enable-plugin=pyside6 --assume-yes-for-downloads --output-filename="Synapse.exe" --output-dir=dist --jobs=4 --lto=no --include-package=synapse --include-package=NodeGraphQt --include-module=oir_reader_rs --include-module=image_process_rs --include-module=matplotlib.backends.backend_svg --include-module=PySide6.QtOpenGL --include-module=PySide6.QtOpenGLWidgets --include-module=synapse.plugin_imports --include-data-files="synapse/llm_node_schema.json=llm_node_schema.json" --include-data-dir="./workflows=workflows" --include-raw-dir="./synapse/site=site" --nofollow-import-to=tkinter --nofollow-import-to=test --nofollow-import-to=torch --nofollow-import-to=transformers --nofollow-import-to=huggingface_hub --nofollow-import-to=sympy --nofollow-import-to=dask --product-version="0.1.1" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-Windows
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload to release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*.exe

  # ── macOS ARM (M-series) ─────────────────────────────────────────────────
  build-macos-arm:
    if: inputs.build_macos_arm
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install .
          pip install nuitka ordered-set zstandard
          pip install oir_reader_rs image_process_rs --find-links https://github.com/m00zu/Synapse/releases/expanded_assets/rust-v0.1.1

      - name: Build macOS app bundle
        env:
          PYTHONPATH: ./util
        run: |
          python -m nuitka --show-progress --show-scons --macos-create-app-bundle --macos-app-name="Synapse" --macos-app-icon=synapse/icons/synapse_icon.png --enable-plugin=pyside6 --assume-yes-for-downloads --output-filename="Synapse" --output-dir=dist --jobs=4 --lto=no --include-package=synapse --include-package=NodeGraphQt --include-module=oir_reader_rs --include-module=image_process_rs --include-module=matplotlib.backends.backend_svg --include-module=PySide6.QtOpenGL --include-module=PySide6.QtOpenGLWidgets --include-module=synapse.plugin_imports --include-data-files="synapse/llm_node_schema.json=llm_node_schema.json" --include-data-dir="./workflows=workflows" --include-raw-dir="./synapse/site=site" --nofollow-import-to=tkinter --nofollow-import-to=test --nofollow-import-to=torch --nofollow-import-to=transformers --nofollow-import-to=huggingface_hub --nofollow-import-to=sympy --nofollow-import-to=dask --product-version="0.1.1" main.py

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Synapse" \
            --window-size 600 400 \
            --icon "Synapse.app" 150 200 \
            --app-drop-link 450 200 \
            "dist/Synapse-macOS-arm64.dmg" \
            "dist/main.app/" || \
          hdiutil create -volname "Synapse" -srcfolder "dist/main.app" -ov -format UDZO "dist/Synapse-macOS-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-macOS-arm64
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload to release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*.dmg